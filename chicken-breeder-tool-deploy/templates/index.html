<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Breeder</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="welcome-page">
    <div class="welcome-stage">
        <div class="welcome-art-wrap">
            <img
                src="{{ url_for('static', filename='images/apex-breeder-welcome.png') }}"
                alt="Apex Breeder welcome screen"
                class="welcome-hero-image"
            >

			<form method="POST" class="welcome-wallet-form" id="wallet-load-form">
				<input type="hidden" name="csrf_token" value="{{ csrf_token }}">
				<div class="welcome-version-badge">Version 1.6</div>
				<div class="wallet-input-shell">
					<input
						type="text"
						id="wallet_address"
						name="wallet_address"
						placeholder="Enter wallet address"
						value="{{ wallet or '' }}"
						required
						autocomplete="off"
					>
					<button type="submit" id="wallet-load-button">Load Wallet</button>
				</div>

				{% if not success and not error %}
					<div class="welcome-success welcome-info-strip" id="wallet-info-strip">
						Load your wallet to access IP, Gene, and Ultimate breeding tools.
					</div>
				{% endif %}

				<div
					id="wallet-load-status"
					class="welcome-success"
					style="display: none;"
					aria-live="polite"
				>
					Validating wallet access...
				</div>

				{% if success %}
					<div class="welcome-success">{{ success }}</div>
				{% endif %}

				{% if error %}
					<div class="welcome-error">{{ error }}</div>
				{% endif %}
			</form>
        </div>
    </div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
	<script>
		document.addEventListener("DOMContentLoaded", function () {
			const form = document.getElementById("wallet-load-form");
			const button = document.getElementById("wallet-load-button");
			const statusBox = document.getElementById("wallet-load-status");
			const infoStrip = document.getElementById("wallet-info-strip");
			const walletInput = document.getElementById("wallet_address");

			if (!form || !button || !statusBox || !walletInput) return;

			form.addEventListener("submit", function () {
				const walletValue = walletInput.value.trim();
				if (!walletValue) return;

				if (infoStrip) {
					infoStrip.style.display = "none";
				}

				document.querySelectorAll(".welcome-error").forEach(function (el) {
					el.style.display = "none";
				});

				document.querySelectorAll(".welcome-success").forEach(function (el) {
					if (el.id !== "wallet-load-status") {
						el.style.display = "none";
					}
				});

				button.disabled = true;
				button.textContent = "Loading...";

				statusBox.style.display = "block";
				statusBox.className = "welcome-success";
				statusBox.textContent = "Validating wallet access...";

				const steps = [
					"Checking static cache data...",
					"Loading wallet chickens...",
					"Preparing breeding data...",
					"Finalizing wallet session..."
				];

				let stepIndex = 0;

				const timer = setInterval(function () {
					if (stepIndex >= steps.length) {
						clearInterval(timer);
						return;
					}

					statusBox.textContent = steps[stepIndex];
					stepIndex += 1;
				}, 1400);

				window.addEventListener("beforeunload", function () {
					clearInterval(timer);
				}, { once: true });
			});
		});
	</script>
	{% if redirect_url %}
		<script>
    			setTimeout(function () {
       	 		window.location.href = "{{ redirect_url }}";
	    		}, 1800);
		</script>
	{% endif %}
</body>
</html>

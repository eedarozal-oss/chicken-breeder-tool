<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Grant Access</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div class="page-header">
                <h1>Owner Grant Access</h1>
                <p class="page-description">
                    Manual owner tool for granting wallet access. This page is hidden from the app and should only be opened directly by URL.
                </p>
            </div>
        </div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="success-message">{{ success }}</div>
        {% endif %}

        <div class="panel" style="max-width: 720px; margin: 0 auto;">
            <h2>Grant Manual Access</h2>
            <form method="POST" class="filter-form">
                <div class="filter-grid" style="grid-template-columns: 1fr;">
                    <div>
                        <label for="owner_password"><strong>Owner Password</strong></label>
                        <input
                            type="password"
                            id="owner_password"
                            name="owner_password"
                            value="{{ owner_password or '' }}"
                            autocomplete="off"
                            required
                        >
                    </div>

                    <div>
                        <label for="wallet_address"><strong>Wallet Address</strong></label>
                        <input
                            type="text"
                            id="wallet_address"
                            name="wallet_address"
                            value="{{ wallet or '' }}"
                            placeholder="0x..."
                            autocomplete="off"
                            required
                        >
                    </div>

                    <div>
                        <label for="wallet_password"><strong>Wallet Password</strong></label>
                        <input
                            type="password"
                            id="wallet_password"
                            name="wallet_password"
                            value="{{ wallet_password or '' }}"
                            placeholder="Last 8 characters of the wallet"
                            autocomplete="off"
                            required
                        >
                    </div>

                    <div>
                        <label for="duration_days"><strong>Duration (Days)</strong></label>
                        <input
                            type="number"
                            id="duration_days"
                            name="duration_days"
                            min="1"
                            step="1"
                            value="{{ duration_days or '' }}"
                            placeholder="1 = 1 day"
                            required
                        >
                    </div>

                    <div class="filter-actions-group">
                        <button type="submit">Grant Access</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
